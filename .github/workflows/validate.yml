name: Validate HTML and CSS

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validators
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Validate HTML
        run: htmlhint "**/*.html"

      - name: Validate CSS
        run: stylelint "**/*.css"
